<!DOCTYPE html>
<html>
<head>
  <title>Execution Data Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 70%;
      padding: 10px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .task {
      background: #334155;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>Execution Data Platform</h1>

<div class="container">
  <input id="taskInput" placeholder="Enter task...">
  <button onclick="addTask()">Add</button>
  <button onclick="loadTasks()">Load Tasks</button>

  <div id="tasks"></div>
</div>

<script>
async function addTask() {
  const title = document.getElementById("taskInput").value;

  await fetch("http://localhost:8000/tasks", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title })
  });

  loadTasks();
}

async function loadTasks() {
  const res = await fetch("http://localhost:8000/tasks");
  const data = await res.json();

  const container = document.getElementById("tasks");
  container.innerHTML = "";

  data.tasks.forEach(task => {
    const div = document.createElement("div");
    div.className = "task";
    div.innerText = `${task.id}: ${task.title}`;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
